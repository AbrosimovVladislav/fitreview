version: '3.1'

networks:
  spring:

services:

  db-fitreview:
    image: postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=fitreview
    volumes:
      - ./init-config.sql:/docker-entrypoint-initdb.d/init-config.sql
    ports:
      - 5432:5432

