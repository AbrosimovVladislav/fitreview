steps:
  # Сборка JAR-файла через Maven
  - name: 'gcr.io/cloud-builders/mvn'
    args: ['clean', 'package']
    dir: 'backend'

  # Сборка Docker-образа
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/fitreview-backend:latest', '-f', 'Dockerfile.be', '.']

  # Загрузка Docker-образа в Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/fitreview-backend:latest']

  # Деплой Docker-образа на Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      [
        'run', 'deploy', 'fitreview-backend',
        '--image', 'gcr.io/$PROJECT_ID/fitreview-backend:latest',
        '--region', 'europe-west1',
        '--platform', 'managed',
        '--allow-unauthenticated'
      ]

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/fitreview-backend:latest'
