steps:
  # Сборка Docker-образа с помощью Jib
  - name: maven:3.9.6-amazoncorretto-21
    entrypoint: mvn
    args: [
      'clean', 'package', 'jib:build',
      '-Djib.to.image=gcr.io/$PROJECT_ID/fitreview-backend:$COMMIT_SHA'
    ]
    dir: 'backend'

  # Деплой в Google Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'fitreview-backend',
      '--image', 'gcr.io/$PROJECT_ID/fitreview-backend:$COMMIT_SHA',
      '--platform', 'managed',
      '--region', 'europe-west1',
      '--allow-unauthenticated'
    ]

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/fitreview-backend:$COMMIT_SHA'
