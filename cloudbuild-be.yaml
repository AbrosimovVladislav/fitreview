options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: maven:3.9.6-amazoncorretto-21
    entrypoint: mvn
    args: [ 'compile','jib:build', '-Djib.to.image=gcr.io/$PROJECT_ID/fit-review-444116:$COMMIT_SHA', '-f', 'backend/pom.xml' ]

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [ 'run', 'deploy', 'fit-review-444116',
            '--project', '$PROJECT_ID',
            '--image', 'gcr.io/$PROJECT_ID/fit-review-444116:$COMMIT_SHA',
            '--platform', 'managed',
            '--region', 'europe-north1',
            '--allow-unauthenticated' ]
