options:
  logging: CLOUD_LOGGING_ONLY  # Запись логов только в Cloud Logging

substitutions:
  _DEPLOY_REGION: "europe-north1"
  _SERVICE_NAME: "next-app"

steps:
  # Сборка Docker-образа
  - name: 'gcr.io/cloud-builders/docker'
    args: [ 'build', '-t', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME', '-f', 'Dockerfile', '.' ]

  # Пуш Docker-образа в Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [ 'push', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME' ]

  # Деплой в Google Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME'
