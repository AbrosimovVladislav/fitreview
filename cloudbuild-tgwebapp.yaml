options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _DEPLOY_REGION: "europe-north1"
  _SERVICE_NAME: "tgweb-app"

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [ 'build', '-t', 'gcr.io/$PROJECT_ID/tgweb-app', '-f', 'Dockerfile.tgweb', '.' ]

  - name: 'gcr.io/cloud-builders/docker'
    args: [ 'push', 'gcr.io/$PROJECT_ID/tgweb-app' ]

  - name: 'gcr.io/cloud-builders/gcloud'
    args: [ 'run', 'deploy', 'tgweb-app',
            '--image', 'gcr.io/$PROJECT_ID/tgweb-app',
            '--region', 'europe-north1',
            '--platform', 'managed',
            '--allow-unauthenticated',
            '--port=3001' ]

images:
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME'
